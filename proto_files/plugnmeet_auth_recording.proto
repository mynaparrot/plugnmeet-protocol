syntax = "proto3";
package plugnmeet;

option go_package = "github.com/mynaparrot/plugnmeet-protocol/plugnmeet";
option php_namespace = "Mynaparrot\\PlugnmeetProto";

import "buf/validate/validate.proto";
import "plugnmeet_auth_room.proto";
import "plugnmeet_recording.proto";
import "plugnmeet_common_api.proto";

message FetchRecordingsReq {
  repeated string room_ids = 1;
  // To get information about a particular session
  optional string room_sid = 2;
  uint32 from = 3;
  uint32 limit = 4;
  string order_by = 5;
}

message RecordingInfo {
  string record_id = 1;
  string room_id = 2;
  string room_sid = 3;
  string file_path = 4;
  float file_size = 5;
  int64 creation_time = 6;
  int64 room_creation_time = 7;
  optional RecordingMetadata metadata = 8;
}

message FetchRecordingsResult {
  int64 total_recordings = 1;
  uint32 from = 2;
  uint32 limit = 3;
  string order_by = 4;
  repeated RecordingInfo recordings_list = 5;
}

message FetchRecordingsRes{
  bool status = 1;
  string msg = 2;
  StatusCode status_code = 3;
  FetchRecordingsResult result = 4;
}

message RecordingInfoReq {
  string record_id = 1 [(buf.validate.field).required = true];
}

message RecordingInfoRes {
  bool status = 1;
  string msg = 2;
  StatusCode status_code = 3;
  RecordingInfo recording_info = 4;
  PastRoomInfo room_info = 5;
}

message DeleteRecordingReq {
  string record_id = 1 [(buf.validate.field).required = true];
}

message DeleteRecordingRes {
  bool status = 1;
  string msg = 2;
  StatusCode status_code = 3;
}

message GetDownloadTokenReq {
  string record_id = 1 [(buf.validate.field).required = true];
}

message GetDownloadTokenRes {
  bool status = 1;
  string msg = 2;
  StatusCode status_code = 3;
  optional string token = 4;
}

message UpdateRecordingMetadataReq {
  string record_id = 1 [(buf.validate.field).required = true];
  RecordingMetadata metadata = 2;
}

message UpdateRecordingMetadataRes {
  bool status = 1;
  string msg = 2;
  StatusCode status_code = 3;
}

message MergeRecordingsByRoomSession {
  // Merge all recordings from a single room session.
  string room_sid = 1 [(buf.validate.field).required = true];
  // Optionally exclude some recordings from the merge.
  repeated string exclude_recording_ids = 2;
}

message MergeRecordingsByIds {
  // The room_id that all recording_ids belong to.
  string room_id = 1 [(buf.validate.field).required = true];
  // A list of recording IDs to merge.
  // All recordings must belong to the specified room_id, but can be from different sessions.
  // The final video will be generated by appending recordings in the order they are provided here.
  repeated string recording_ids = 2 [(buf.validate.field).repeated.min_items = 2];
}

message MergeRecordingsReq {
  option (buf.validate.message).oneof = {
    fields: ["by_session", "by_ids"],
    required: true
  };

  oneof merge_scope {
    // Merge recordings based on a single room session.
    MergeRecordingsByRoomSession by_session = 1;
    // Merge a specific list of recordings from the same room.
    MergeRecordingsByIds by_ids = 2;
  }
}
